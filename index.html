<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FIXXER Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0A0A0B',
              card: '#1A1A1B',
              primary: '#00FF87',
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #0A0A0B !important; color: #FFFFFF !important; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; min-height: 100vh; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0A0A0B; }
      ::-webkit-scrollbar-thumb { background: #1A1A1B; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #00FF87; }
    </style>
  </head>
  <body class="bg-[#0A0A0B] text-white min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
